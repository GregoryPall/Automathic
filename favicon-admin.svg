<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c53030;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)"/>
  
  <!-- Lock body -->
  <rect x="22" y="30" width="20" height="18" rx="2" fill="#fff"/>
  
  <!-- Lock shackle -->
  <path d="M 26 30 L 26 22 A 6 6 0 0 1 38 22 L 38 30" 
        fill="none" stroke="#fff" stroke-width="4"/>
  
  <!-- Keyhole -->
  <circle cx="32" cy="36" r="2.5" fill="#e53e3e"/>
  <rect x="31" y="36" width="2" height="6" fill="#e53e3e"/>
</svg>
