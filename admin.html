<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automathic — Administration</title>
    <link rel="icon" type="image/svg+xml" href="favicon-admin.svg">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
/* ================================================================
   BASE — même thème que le jeu
================================================================ */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg:     #eef1fa;
    --bg2:    #ffffff;
    --card:   #f4f6fd;
    --border: #d8ddf0;
    --text:   #1a1a2e;
    --dim:    #7080a0;
    --gold:   #d4920a;
    --shadow: rgba(80,100,180,.10);
    --elec:   #c8900a;
    --hydro:  #0070ee;
    --pneu:   #666;
    --meca:   #dd1111;
    --elec2:  #7418cc;
    --ther:   #e05000;
    --danger: #dd1111;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ================================================================
   CONNEXION
================================================================ */
#login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
}
.login-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px;
    width: 340px; box-shadow: 0 4px 24px var(--shadow);
    text-align: center;
}
.login-logo { font-size: 2.2em; margin-bottom: 6px; }
.login-title { font-size: 1.1em; font-weight: 900; margin-bottom: 4px; }
.login-sub { font-size: .72em; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
.login-input {
    width: 100%; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    padding: 11px 14px; outline: none; margin-bottom: 12px;
    transition: border-color .2s;
}
.login-input:focus { border-color: var(--hydro); }
.login-input::placeholder { color: var(--dim); }
.login-btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    background: linear-gradient(135deg, var(--hydro), var(--elec2));
    color: #fff; box-shadow: 0 4px 14px rgba(0,112,238,.28);
    transition: all .2s;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,112,238,.4); }
.login-error { color: var(--danger); font-size: .82em; margin-top: 10px; min-height: 20px; }

/* ================================================================
   PANNEAU ADMIN
================================================================ */
#admin-panel { display: none; }

.admin-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center;
    justify-content: space-between; box-shadow: 0 2px 10px var(--shadow);
    position: sticky; top: 0; z-index: 100;
}
.admin-header-left { display: flex; align-items: center; gap: 12px; }
.admin-header h1 { font-size: 1.2em; font-weight: 900; }
.admin-badge {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 9px;
    font-size: .65em; letter-spacing: 2px; text-transform: uppercase; color: var(--dim);
}
.btn-logout {
    padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 7px;
    background: var(--card); color: var(--dim); font-size: .78em; font-weight: 700;
    cursor: pointer; transition: all .2s;
}
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

.admin-body { max-width: 1280px; margin: 0 auto; padding: 24px 24px 48px; }

/* SECTION */
.section {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px; margin-bottom: 20px;
    box-shadow: 0 2px 12px var(--shadow);
}
.section-title {
    font-size: .68em; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dim); margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
}

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; text-align: center;
}
.stat-val { font-size: 1.9em; font-weight: 900; color: var(--gold); }
.stat-lbl { font-size: .65em; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-top: 4px; }

/* ÉQUIPES */
.teams-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-bottom: 16px; }
.team-admin-card {
    border-radius: 10px; padding: 16px 10px; text-align: center;
    border: 2px solid var(--border); background: var(--card); transition: all .2s;
}
.tac-icon  { font-size: 1.6em; }
.tac-name  { font-size: .7em; font-weight: 700; margin: 5px 0 3px; }
.tac-score { font-size: 1.5em; font-weight: 900; color: var(--gold); }
.tac-players { font-size: .62em; color: var(--dim); margin-top: 2px; }

/* BOUTONS DANGER */
.btn-danger {
    padding: 9px 18px; border: none; border-radius: 7px;
    font-size: .78em; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; background: rgba(221,17,17,.1); color: var(--danger);
    border: 1.5px solid rgba(221,17,17,.3); transition: all .2s;
}
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-danger-full {
    width: 100%; padding: 11px; border: none; border-radius: 8px;
    font-size: .82em; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; background: rgba(221,17,17,.08); color: var(--danger);
    border: 1.5px solid rgba(221,17,17,.25); transition: all .2s; margin-top: 12px;
}
.btn-danger-full:hover { background: var(--danger); color: #fff; }

/* TABLE JOUEURS */
.players-table { width: 100%; border-collapse: collapse; font-size: .85em; }
.players-table th {
    background: var(--card); padding: 10px 12px; text-align: left;
    font-size: .68em; letter-spacing: 2px; text-transform: uppercase;
    color: var(--dim); border-bottom: 1px solid var(--border); font-weight: 700;
}
.players-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.players-table tr:last-child td { border-bottom: none; }
.players-table tr:hover td { background: var(--card); }

.rank-cell { font-weight: 700; text-align: center; }
.rank-g { color: #c8900a; }
.rank-s { color: #888; }
.rank-b { color: #b07020; }

.team-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 4px; font-size: .78em; font-weight: 700;
    border: 1.5px solid; white-space: nowrap;
}
.mission-bar {
    display: flex; align-items: center; gap: 6px;
}
.mission-count { font-weight: 700; color: var(--gold); }
.mission-track {
    flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.mission-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .3s; }

.pseudo-chip {
    font-family: monospace; font-size: .78em;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; color: var(--dim);
}
.btn-del {
    padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 5px; background: transparent; color: var(--dim);
    font-size: .75em; cursor: pointer; transition: all .2s;
}
.btn-del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

.empty-msg { text-align: center; color: var(--dim); padding: 28px; font-size: .88em; }

/* MISSIONS STATS */
.missions-stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.ms-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    display: flex; align-items: center; gap: 9px; font-size: .82em;
}
.ms-icon { font-size: 1.1em; flex-shrink: 0; }
.ms-name { flex: 1; font-size: .78em; color: var(--dim); }
.ms-count { font-weight: 700; color: var(--gold); flex-shrink: 0; }

/* RESPONSIVE */
@media (max-width: 900px) {
    .teams-grid { grid-template-columns: repeat(3,1fr); }
    .stats-grid  { grid-template-columns: repeat(2,1fr); }
    .missions-stats-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 600px) {
    .teams-grid { grid-template-columns: repeat(2,1fr); }
}
    </style>
</head>
<body>

<!-- ================================================================
     CONNEXION
================================================================ -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">⚙️</div>
        <div class="login-title">Automathic</div>
        <div class="login-sub">Administration</div>
        <input type="password" id="pwd-input" class="login-input" placeholder="Mot de passe…" autocomplete="off">
        <button class="login-btn" onclick="login()">Accéder au panneau</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ================================================================
     PANNEAU ADMIN
================================================================ -->
<div id="admin-panel">

    <div class="admin-header">
        <div class="admin-header-left">
            <span style="font-size:1.3em">⚙️</span>
            <h1>Automathic</h1>
            <span class="admin-badge">Administration</span>
        </div>
        <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
    </div>

    <div class="admin-body">

        <!-- STATS GLOBALES -->
        <div class="section">
            <div class="section-title">📊 Vue d'ensemble</div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-val" id="st-players">—</div><div class="stat-lbl">Joueurs</div></div>
                <div class="stat-box"><div class="stat-val" id="st-parties">—</div><div class="stat-lbl">Parties jouées</div></div>
                <div class="stat-box"><div class="stat-val" id="st-best">—</div><div class="stat-lbl">Meilleur score</div></div>
                <div class="stat-box"><div class="stat-val" id="st-missions">—</div><div class="stat-lbl">Missions débloquées</div></div>
            </div>
        </div>

        <!-- SCORES ÉQUIPES -->
        <div class="section">
            <div class="section-title">
                <span>🏆 Scores des équipes</span>
                <button class="btn-danger" onclick="resetTeams()">🔄 Remettre à zéro</button>
            </div>
            <div class="teams-grid" id="teams-grid"><!-- JS --></div>
        </div>

        <!-- JOUEURS -->
        <div class="section">
            <div class="section-title">
                <span>👤 Joueurs</span>
                <button class="btn-danger" onclick="resetAllPlayers()">🗑️ Tout supprimer</button>
            </div>
            <div id="players-container"><div class="empty-msg">Chargement…</div></div>
        </div>

        <!-- MISSIONS -->
        <div class="section">
            <div class="section-title">🎯 Statistiques des missions</div>
            <div class="missions-stats-grid" id="missions-stats"><!-- JS --></div>
        </div>

    </div>
</div>

<script>
/* ================================================================
   FIREBASE
================================================================ */
firebase.initializeApp({
    apiKey:            "AIzaSyCs7Xk5gh7WFNs3DVzIQ4AQsmZVGpf0SO0",
    authDomain:        "math-game-a43d6.firebaseapp.com",
    databaseURL:       "https://math-game-a43d6-default-rtdb.firebaseio.com",
    projectId:         "math-game-a43d6",
    storageBucket:     "math-game-a43d6.firebasestorage.app",
    messagingSenderId: "295807036015",
    appId:             "1:295807036015:web:840223907e097b08fd3b9a"
});
const db = firebase.database();

/* ================================================================
   CONSTANTES
================================================================ */
const ADMIN_PASSWORD = "admin2024";

const TEAMS = {
    electriques:   { name:'Les Électriques',   short:'Électriques',   icon:'⚡', color:'#c8900a' },
    hydrauliques:  { name:'Les Hydrauliques',  short:'Hydrauliques',  icon:'💧', color:'#0070ee' },
    pneumatiques:  { name:'Les Pneumatiques',  short:'Pneumatiques',  icon:'💨', color:'#666666' },
    mecaniques:    { name:'Les Mécaniques',    short:'Mécaniques',    icon:'⚙️', color:'#dd1111' },
    electroniques: { name:'Les Électroniques', short:'Électroniques', icon:'🔌', color:'#7418cc' },
    thermiques:    { name:'Les Thermiques',    short:'Thermiques',    icon:'🔥', color:'#e05000' }
};

const MISSIONS = [
    {id:1,  icon:'⭐',     name:'3 bonnes réponses de suite'},
    {id:2,  icon:'⭐⭐',   name:'5 bonnes réponses de suite'},
    {id:3,  icon:'⭐⭐⭐', name:'8 bonnes réponses de suite'},
    {id:4,  icon:'🏆',     name:'Questionnaire parfait (10/10)'},
    {id:5,  icon:'⚡',     name:'3 réponses rapides (<10 s)'},
    {id:6,  icon:'⚡⚡',   name:'5 réponses rapides (<10 s)'},
    {id:7,  icon:'🔥',     name:'Combo ×2,5'},
    {id:8,  icon:'🔥🔥',   name:'Combo ×3,5'},
    {id:9,  icon:'🎯',     name:'Sans erreur sur 6 premières'},
    {id:10, icon:'🎯🎯',   name:'Sans erreur sur 10 questions'},
    {id:11, icon:'⚡⚡⚡', name:'10 questions en < 80 s'},
    {id:12, icon:'🚀',     name:'5 questions en < 30 s'},
    {id:13, icon:'💰',     name:'Score > 50 pts'},
    {id:14, icon:'💰💰',   name:'Score > 80 pts'},
    {id:15, icon:'📈',     name:'Améliorer son record'},
    {id:16, icon:'🏅',     name:'Battre le joueur précédent'}
];

/* ================================================================
   ÉTAT
================================================================ */
let fbTeams    = {};
let fbPlayers  = {};
let fbMissions = {};
let listeners  = [];

/* ================================================================
   AUTH
================================================================ */
function login() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === ADMIN_PASSWORD) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display  = 'block';
        startListeners();
    } else {
        document.getElementById('login-error').textContent = '❌ Mot de passe incorrect';
        document.getElementById('pwd-input').value = '';
    }
}
document.getElementById('pwd-input').addEventListener('keypress', e => { if(e.key==='Enter') login(); });

function logout() {
    listeners.forEach(fn => fn());
    listeners = [];
    document.getElementById('admin-panel').style.display  = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pwd-input').value = '';
    document.getElementById('login-error').textContent = '';
}

/* ================================================================
   LISTENERS TEMPS RÉEL
================================================================ */
function startListeners() {
    const refs = ['equipes','joueurs','missions'];
    refs.forEach(path => {
        const ref = db.ref(path);
        const fn  = ref.on('value', snap => {
            if(path==='equipes')  { fbTeams    = snap.val() || {}; }
            if(path==='joueurs')  { fbPlayers  = snap.val() || {}; }
            if(path==='missions') { fbMissions = snap.val() || {}; }
            renderAll();
        }, err => console.warn(path, err));
        listeners.push(() => ref.off('value', fn));
    });
}

/* ================================================================
   RENDER
================================================================ */
function renderAll() {
    renderStats();
    renderTeams();
    renderPlayers();
    renderMissionsStats();
}

function renderStats() {
    const players = Object.values(fbPlayers);
    const allMissions = Object.values(fbMissions).flat();
    const bestScore = players.length ? Math.max(...players.map(p => p.meilleurscore||0)) : 0;
    const totalParties = players.reduce((s,p) => s + (p.score !== undefined ? 1 : 0), 0);

    document.getElementById('st-players').textContent  = players.length;
    document.getElementById('st-parties').textContent  = players.length; // 1 entrée = au moins 1 partie
    document.getElementById('st-best').textContent     = bestScore;
    document.getElementById('st-missions').textContent = allMissions.length;
}

function renderTeams() {
    const sorted = Object.entries(TEAMS).map(([id,info]) => ({
        id, ...info,
        score:   fbTeams[id]?.score   || 0,
        players: (fbTeams[id]?.joueurs || []).length
    })).sort((a,b) => b.score - a.score);

    document.getElementById('teams-grid').innerHTML = sorted.map((t,i) => `
        <div class="team-admin-card" style="border-color:${t.color}55;background:${t.color}0d">
            <div class="tac-icon">${t.icon}</div>
            <div class="tac-name" style="color:${t.color}">${t.short}</div>
            <div class="tac-score">${t.score}</div>
            <div class="tac-players">${t.players} joueur(s) · ${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
        </div>`).join('');
}

function renderPlayers() {
    const players = Object.values(fbPlayers)
        .sort((a,b) => (b.meilleurscore||0) - (a.meilleurscore||0));

    if (!players.length) {
        document.getElementById('players-container').innerHTML = '<div class="empty-msg">Aucun joueur encore.</div>';
        return;
    }

    const rows = players.map((p, i) => {
        const t = TEAMS[p.equipe] || { icon:'?', color:'#888', short:'—' };
        const ms = (fbMissions[p.nom] || []).length;
        const posClass = i===0?'rank-g':i===1?'rank-s':i===2?'rank-b':'';
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
        const date = p.ts ? new Date(p.ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
        return `
        <tr>
            <td class="rank-cell ${posClass}">${medal}</td>
            <td><strong>${p.prenom||p.nom}</strong> <span class="pseudo-chip">${p.nom}</span></td>
            <td>
                <span class="team-chip" style="color:${t.color};border-color:${t.color}55;background:${t.color}0d">
                    ${t.icon} ${t.short}
                </span>
            </td>
            <td><strong>${p.meilleurscore||0}</strong> pts</td>
            <td>
                <div class="mission-bar">
                    <span class="mission-count">${ms}/16</span>
                    <div class="mission-track"><div class="mission-fill" style="width:${(ms/16*100).toFixed(0)}%"></div></div>
                </div>
            </td>
            <td style="color:var(--dim);font-size:.78em">${date}</td>
            <td><button class="btn-del" onclick="deletePlayer('${p.nom}','${p.prenom||p.nom}','${p.equipe}',${p.score||0})">🗑️</button></td>
        </tr>`;
    }).join('');

    document.getElementById('players-container').innerHTML = `
        <table class="players-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Joueur</th>
                    <th>Équipe</th>
                    <th>Meilleur score</th>
                    <th>Missions</th>
                    <th>Dernière partie</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function renderMissionsStats() {
    const allMissions = Object.values(fbMissions);
    const counts = {};
    MISSIONS.forEach(m => counts[m.id] = 0);
    allMissions.forEach(ms => (ms||[]).forEach(id => { if(counts[id]!==undefined) counts[id]++; }));

    document.getElementById('missions-stats').innerHTML = MISSIONS.map(m => `
        <div class="ms-card">
            <span class="ms-icon">${m.icon}</span>
            <span class="ms-name">${m.name}</span>
            <span class="ms-count">${counts[m.id]||0}</span>
        </div>`).join('');
}

/* ================================================================
   ACTIONS ADMIN
================================================================ */
async function deletePlayer(pseudo, prenom, equipe, score) {
    if (!confirm(`Supprimer ${prenom} (${pseudo}) et retirer ${score} pts à ${TEAMS[equipe]?.short||equipe} ?`)) return;
    try {
        await db.ref('joueurs/'   + pseudo).remove();
        await db.ref('missions/'  + pseudo).remove();
        // Retirer le joueur de la liste de l'équipe + déduire les points
        const teamData = fbTeams[equipe] || {};
        const newScore   = Math.max(0, (teamData.score||0) - score);
        const newPlayers = (teamData.joueurs||[]).filter(p => p !== pseudo);
        await db.ref('equipes/' + equipe).update({ score: newScore, joueurs: newPlayers });
    } catch(e) { alert('Erreur : ' + e.message); }
}

async function resetTeams() {
    if (!confirm('Remettre à zéro les scores des 6 équipes ? Les joueurs sont conservés.')) return;
    if (!confirm('Dernière confirmation — cette action est irréversible.')) return;
    try {
        const updates = {};
        Object.keys(TEAMS).forEach(id => { updates[id + '/score'] = 0; });
        await db.ref('equipes').update(updates);
    } catch(e) { alert('Erreur : ' + e.message); }
}

async function resetAllPlayers() {
    if (!confirm('⚠️ Supprimer TOUS les joueurs, missions et remettre les équipes à zéro ?')) return;
    if (!confirm('Dernière confirmation — TOUTES les données seront perdues.')) return;
    try {
        await db.ref('joueurs').remove();
        await db.ref('missions').remove();
        const equipeReset = {};
        Object.keys(TEAMS).forEach(id => { equipeReset[id] = { score:0, joueurs:[] }; });
        await db.ref('equipes').set(equipeReset);
        await db.ref('config/lastScore').set(0);
    } catch(e) { alert('Erreur : ' + e.message); }
}
</script>
</body>
</html>
