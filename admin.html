<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Quiz Maths Bac Pro</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-screen {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 400px;
            margin: 100px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .login-screen h2 {
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-screen input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-screen button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-screen button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .error-message {
            color: #e53e3e;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .admin-panel {
            display: none;
        }

        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section h2 {
            color: #2d3748;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .house-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .house-card {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
            position: relative;
        }

        .house-card.phoenix {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .house-card.axiome {
            background: linear-gradient(135deg, #40e0d0 0%, #3dbfb0 100%);
        }

        .house-card.nebula {
            background: linear-gradient(135deg, #8a2be2 0%, #7928ca 100%);
        }

        .house-card.zenith {
            background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
        }

        .house-card .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .house-card .name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .house-card .score {
            font-size: 2.5em;
            font-weight: bold;
        }

        .reset-all-btn {
            width: 100%;
            padding: 15px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .reset-all-btn:hover {
            background: #c53030;
            transform: translateY(-2px);
        }

        .top-scores-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .top-scores-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        .top-scores-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .top-scores-table tr:hover {
            background: #f7fafc;
        }

        .rank {
            font-weight: bold;
            font-size: 1.2em;
        }

        .rank.gold { color: #ffd700; }
        .rank.silver { color: #c0c0c0; }
        .rank.bronze { color: #cd7f32; }

        .house-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .house-badge.phoenix { background: #ff6b6b; }
        .house-badge.axiome { background: #40e0d0; }
        .house-badge.nebula { background: #8a2be2; }
        .house-badge.zenith { background: #ffa500; }

        .delete-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c53030;
            transform: scale(1.05);
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #667eea;
            color: white;
        }

        .empty-message {
            text-align: center;
            color: #718096;
            padding: 40px;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #2d3748;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Écran de connexion -->
    <div id="login-screen" class="login-screen">
        <h2>🔐 Connexion Administrateur</h2>
        <input type="password" id="password-input" placeholder="Mot de passe" autofocus>
        <button onclick="login()">Se connecter</button>
        <div id="error-message" class="error-message"></div>
    </div>

    <!-- Panneau d'administration -->
    <div id="admin-panel" class="admin-panel">
        <button class="logout-btn" onclick="logout()">🚪 Déconnexion</button>
        
        <div class="container">
            <h1>🎓 Administration - Quiz Maths Bac Pro</h1>

            <!-- Statistiques générales -->
            <div class="section">
                <h2>📊 Statistiques</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total-players">0</div>
                        <div class="stat-label">Joueurs totaux</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-points">0</div>
                        <div class="stat-label">Points totaux</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="highest-score">0</div>
                        <div class="stat-label">Meilleur score</div>
                    </div>
                </div>
            </div>

            <!-- Scores des maisons -->
            <div class="section">
                <h2>🏆 Scores des Maisons</h2>
                <div class="house-scores">
                    <div class="house-card phoenix">
                        <div class="icon">🔥</div>
                        <div class="name">Phoenix</div>
                        <div class="score" id="score-phoenix">0</div>
                    </div>
                    <div class="house-card axiome">
                        <div class="icon">💎</div>
                        <div class="name">Axiome</div>
                        <div class="score" id="score-axiome">0</div>
                    </div>
                    <div class="house-card nebula">
                        <div class="icon">🌌</div>
                        <div class="name">Nebula</div>
                        <div class="score" id="score-nebula">0</div>
                    </div>
                    <div class="house-card zenith">
                        <div class="icon">⭐</div>
                        <div class="name">Zenith</div>
                        <div class="score" id="score-zenith">0</div>
                    </div>
                </div>
                <button class="reset-all-btn" onclick="resetAllHouses()">
                    🔄 Remettre à zéro tous les scores des maisons
                </button>
            </div>

            <!-- Top 10 des joueurs -->
            <div class="section">
                <h2>🥇 Top 10 - Classement des Joueurs</h2>
                <div id="players-container">
                    <div class="empty-message">Aucun joueur pour le moment</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration Firebase (identique au jeu)
        const firebaseConfig = {
            apiKey: "AIzaSyCs7Xk5gh7WFNs3DVzIQ4AQsmZVGpf0SO0",
            authDomain: "math-game-a43d6.firebaseapp.com",
            databaseURL: "https://math-game-a43d6-default-rtdb.firebaseio.com",
            projectId: "math-game-a43d6",
            storageBucket: "math-game-a43d6.firebasestorage.app",
            messagingSenderId: "295807036015",
            appId: "1:295807036015:web:840223907e097b08fd3b9a",
            measurementId: "G-5QGT483Z7T"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Mot de passe admin (à changer !)
        const ADMIN_PASSWORD = "admin2024";

        let houseScores = { phoenix: 0, axiome: 0, nebula: 0, zenith: 0 };
        let topScores = [];

        // Connexion
        function login() {
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-message');

            if (password === ADMIN_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').style.display = 'block';
                loadData();
            } else {
                errorMsg.textContent = '❌ Mot de passe incorrect';
                document.getElementById('password-input').value = '';
            }
        }

        // Déconnexion
        function logout() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('password-input').value = '';
            document.getElementById('error-message').textContent = '';
        }

        // Permettre de se connecter avec la touche Entrée
        document.getElementById('password-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        // Charger toutes les données
        async function loadData() {
            await loadHouseScores();
            await loadTopScores();
            updateStats();
        }

        // Charger les scores des maisons
        async function loadHouseScores() {
            try {
                const snapshot = await database.ref('houseScores').once('value');
                const data = snapshot.val();
                
                if (data) {
                    houseScores = {
                        phoenix: data.phoenix || 0,
                        axiome: data.axiome || 0,
                        nebula: data.nebula || 0,
                        zenith: data.zenith || 0
                    };
                }

                displayHouseScores();
            } catch (error) {
                console.error('Erreur chargement scores maisons:', error);
            }
        }

        // Afficher les scores des maisons
        function displayHouseScores() {
            document.getElementById('score-phoenix').textContent = houseScores.phoenix;
            document.getElementById('score-axiome').textContent = houseScores.axiome;
            document.getElementById('score-nebula').textContent = houseScores.nebula;
            document.getElementById('score-zenith').textContent = houseScores.zenith;
        }

        // Charger le top 10
        async function loadTopScores() {
            try {
                const snapshot = await database.ref('topScores').once('value');
                topScores = snapshot.val() || [];
                displayTopScores();
            } catch (error) {
                console.error('Erreur chargement top scores:', error);
            }
        }

        // Afficher le top 10
        function displayTopScores() {
            const container = document.getElementById('players-container');

            if (topScores.length === 0) {
                container.innerHTML = '<div class="empty-message">Aucun joueur pour le moment</div>';
                return;
            }

            const houseIcons = {
                phoenix: '🔥',
                axiome: '💎',
                nebula: '🌌',
                zenith: '⭐'
            };

            let html = '<table class="top-scores-table">';
            html += `
                <thead>
                    <tr>
                        <th>Rang</th>
                        <th>Nom</th>
                        <th>Maison</th>
                        <th>Score</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
            `;

            topScores.forEach((player, index) => {
                const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                const date = new Date(player.date).toLocaleDateString('fr-FR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                html += `
                    <tr>
                        <td><span class="rank ${rankClass}">${medal || (index + 1)}</span></td>
                        <td><strong>${player.name}</strong></td>
                        <td>
                            <span class="house-badge ${player.house}">
                                ${houseIcons[player.house]} ${player.house.charAt(0).toUpperCase() + player.house.slice(1)}
                            </span>
                        </td>
                        <td><strong>${player.score} pts</strong></td>
                        <td>${date}</td>
                        <td>
                            <button class="delete-btn" onclick="deletePlayer(${index})">
                                🗑️ Supprimer
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Supprimer un joueur
        async function deletePlayer(index) {
            const player = topScores[index];
            const confirmDelete = confirm(
                `Supprimer le score de ${player.name} (${player.score} pts) de la maison ${player.house} ?\n\n` +
                `⚠️ Les ${player.score} points seront également retirés du score de la maison ${player.house}.`
            );

            if (!confirmDelete) return;

            try {
                // Retirer les points de la maison
                houseScores[player.house] = Math.max(0, houseScores[player.house] - player.score);
                await database.ref('houseScores').update({
                    [player.house]: houseScores[player.house]
                });

                // Supprimer le joueur du top 10
                topScores.splice(index, 1);
                await database.ref('topScores').set(topScores);

                // Recharger l'affichage
                displayHouseScores();
                displayTopScores();
                updateStats();

                alert(`✅ Le joueur ${player.name} a été supprimé et ${player.score} points ont été retirés de ${player.house}.`);
            } catch (error) {
                console.error('Erreur suppression joueur:', error);
                alert('❌ Erreur lors de la suppression');
            }
        }

        // Remettre à zéro tous les scores des maisons
        async function resetAllHouses() {
            const confirmReset = confirm(
                '⚠️ ATTENTION ⚠️\n\n' +
                'Voulez-vous vraiment remettre à ZÉRO tous les scores des 4 maisons ?\n\n' +
                '❌ Cette action est IRRÉVERSIBLE\n' +
                '❌ Le classement des joueurs sera conservé mais les scores des maisons seront perdus'
            );

            if (!confirmReset) return;

            const doubleConfirm = confirm(
                'Dernière confirmation :\n\n' +
                'Êtes-vous VRAIMENT SÛR de vouloir remettre à zéro tous les scores ?'
            );

            if (!doubleConfirm) return;

            try {
                houseScores = { phoenix: 0, axiome: 0, nebula: 0, zenith: 0 };
                await database.ref('houseScores').set(houseScores);
                
                displayHouseScores();
                updateStats();

                alert('✅ Tous les scores des maisons ont été remis à zéro');
            } catch (error) {
                console.error('Erreur reset maisons:', error);
                alert('❌ Erreur lors de la réinitialisation');
            }
        }

        // Mettre à jour les statistiques
        function updateStats() {
            const totalPlayers = topScores.length;
            const totalPoints = Object.values(houseScores).reduce((sum, score) => sum + score, 0);
            const highestScore = topScores.length > 0 ? Math.max(...topScores.map(p => p.score)) : 0;

            document.getElementById('total-players').textContent = totalPlayers;
            document.getElementById('total-points').textContent = totalPoints;
            document.getElementById('highest-score').textContent = highestScore;
        }

        // Rafraîchir automatiquement toutes les 30 secondes
        setInterval(() => {
            if (document.getElementById('admin-panel').style.display === 'block') {
                loadData();
            }
        }, 30000);
    </script>
</body>
</html>
